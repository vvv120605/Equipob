spring.application.name=repuestos

server.port=9004

# Configuración de conexión a MySQL
spring.datasource.url=jdbc:mysql://localhost:3311/repuestos
spring.datasource.username=vcofre
spring.datasource.password=vcofre123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA: desactivar creación automática de tablas
spring.jpa.hibernate.ddl-auto=none

# Dialecto recomendado para MySQL
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Flyway: habilitar migraciones
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
